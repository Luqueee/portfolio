                    <form

                        method="post"
                        style="margin-top: 1px !important"
                        class="lineright">
                        <h3><b>Contacto</b></h3>

                        <input
                            type="text"
                            name="Nombre"
                            id="Nombre"
                            placeholder="Nombre" />

                        <input
                            type="text"
                            name="Apellidos"
                            id="Apellidos"
                            placeholder="Apellidos" />

                        <input
                            type="email"
                            name="Correo"
                            id="Correo"
                            placeholder="Correo" />

                        <input
                            type="date"
                            name="fecha"
                            id="fecha"
                            placeholder="fecha" />

                        <label for="nivel">Nivel academico</label>

                        <span
                            ><input
                                type="radio"
                                name="fp"
                                id="nivell"
                                value="ESO"
                                placeholder="ESO" />
                            ESO</span
                        >
                        <span
                            ><input
                                type="radio"
                                name="fp"
                                id="nivell"
                                value="BATX/Grados"
                                placeholder="BATX/Grados" />
                            BATX/Grados</span
                        >
                        <span
                            ><input
                                type="radio"
                                name="fp"
                                id="nivell"
                                value="Universitarios"
                                placeholder="Universitarios" />
                            Universitarios</span
                        >
                        <span
                            ><input
                                type="radio"
                                name="fp"
                                id="nivell"
                                value="otros"
                                placeholder="otros" />
                            otros</span
                        >

                        <label for="temas"
                            >Selecciona un tema de interés:</label
                        >
                        <select id="temas">
                            <option value="algoritmos">Algoritmos</option>
                            <option value="estructuras_de_datos">
                                Estructuras de Datos
                            </option>
                            <option value="desarrollo_web">
                                Desarrollo Web
                            </option>
                            <option value="inteligencia_artificial">
                                Inteligencia Artificial
                            </option>
                            <option value="aplicaciones_moviles">
                                Aplicaciones Móviles
                            </option>
                            <option value="seguridad_informatica">
                                Seguridad Informática
                            </option>
                            <!-- Puedes añadir más opciones según tus necesidades -->
                        </select>

                        <label for="missatge">Mensaje</label>
                        <textarea
                            name="mensaje"
                            id="mensaje"
                            cols="55"
                            rows="3"
                            placeholder="Mensaje"></textarea>
                        <div class="buttons">
                            <input type="submit" value="Enviar" />
                            <input type="reset" value="Resetear" />
                        </div>
                    </form>
